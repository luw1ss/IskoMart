<!DOCTYPE html>
<!--
  ============================================================
  LOGIN.HTML — Structure only
  Linked files:
    login.css  → all the styling
    login.js   → all the logic
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IskoMart — Sign In</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Our own stylesheet -->
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- Decorative background blobs (purely visual) -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <!-- ====== MAIN LOGIN CARD ====== -->
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-text">
        <span class="pup">PUP</span><span class="mart">Mart</span>
      </div>
      <div class="logo-sub">The PUP Student Marketplace</div>
      <div class="logo-badge">
        <i class="fa-solid fa-shield-halved"></i> @iskolarngbayan.pup.edu.ph only
      </div>
    </div>

    <h2>Sign in to your account</h2>

    <!-- Error message box — hidden by default, shown by JS when login fails -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Email field -->
    <div class="form-group">
      <label>PUP Email Address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="yourid@iskolarngbayan.pup.edu.ph" autocomplete="email">
      </div>
    </div>

    <!-- Password field -->
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <!-- Eye icon toggles password visibility — calls togglePw() in login.js -->
        <span class="toggle-pw" onclick="togglePw('password', this)">
          <i class="fa-solid fa-eye"></i>
        </span>
      </div>
    </div>

    <!-- Sign In button — calls login() in login.js -->
    <button class="btn-submit" id="loginBtn" onclick="login()">
      <div class="spinner"></div>
      <span class="btn-label">Sign In <i class="fa-solid fa-arrow-right"></i></span>
    </button>

    <div class="divider">or</div>

    <!-- Link to register page -->
    <div class="switch">
      New to IskoMart? <a href="register.html">Create an account</a>
    </div>

    <!-- Emergency reset — clears localStorage if something breaks -->
    <div class="reset-link">
      <a onclick="clearAndReset()">Having trouble? Clear saved data</a>
    </div>

  </div>

  <!-- Our own JavaScript file — loaded at the bottom so HTML loads first -->
  <script src="login.js"></script>
</body>
</html>
